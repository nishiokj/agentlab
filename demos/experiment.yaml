version: '0.3'
experiment:
  id: swebench_mini_harness_eval
  name: SWE-bench Mini Harness Eval
  workload_type: agent_runtime
  description: Small real issue set for testing harness metrics and artifacts.
  owner: demos

dataset:
  suite_id: swebench_mini
  provider: local_jsonl
  path: ./swebench_mini_tasks.jsonl
  schema_version: task_jsonl_v1
  split_id: eval
  limit: 4

design:
  sanitization_profile: hermetic_functional
  comparison: paired
  replications: 1
  random_seed: 42
  shuffle_tasks: true
  max_concurrency: 1

metrics:
  - id: duration_ms
    source: runner
    weight: 0
    primary: false
  - id: tokens_in
    source: events
    event_type: model_call_end
    event_field: usage.tokens_in
    aggregate: sum
    weight: 0
    primary: false
  - id: tokens_out
    source: events
    event_type: model_call_end
    event_field: usage.tokens_out
    aggregate: sum
    weight: 0
    primary: false
  - id: turn_count
    source: events
    event_type: model_call_end
    aggregate: count
    weight: 0
    primary: false
  - id: difficulty_match
    source: output
    json_pointer: /metrics/difficulty_match
    direction: maximize
    weight: 1
    primary: true
  - id: keyword_hits
    source: output
    json_pointer: /metrics/keyword_hits
    weight: 0
    primary: false
  - id: response_chars
    source: output
    json_pointer: /metrics/response_chars
    weight: 0
    primary: false
  - id: diff_lines
    source: artifacts
    artifact_measure: diff_lines
    direction: minimize
    weight: 0
    primary: false
  - id: json_artifact_files
    source: artifacts
    artifact_measure: file_count
    artifact_glob: artifacts/**/*.json
    weight: 0
    primary: false

artifacts:
  collect:
    - artifacts/**/*.json
    - artifacts/**/*.txt
  diff: true
  base_dir: .

baseline:
  variant_id: control
  bindings:
    difficulty_threshold: 5
    difficulty_bias: 0

variant_plan:
  - variant_id: treatment
    bindings:
      difficulty_threshold: 2
      difficulty_bias: 0

benchmark:
  grader:
    strategy: in_task_image
    command:
      - node
      - ./agentlab_demo_grader.js
    conclusion:
      mode: direct

policy:
  timeout_ms: 600000
  task_sandbox:
    profile: hermetic_functional
    network: none
    allowed_hosts: []

runtime:
  agent_runtime:
    artifact: .
    image: node:20-alpine
    command:
      - node
      - /opt/agent/agentlab_demo_harness.js
    integration_level: cli_events
    network: none

validity:
  fail_on_state_leak: true
  fail_on_profile_invariant_violation: true
