name: benchmark-v0-gates

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'bench/**'
      - 'bench/integration/**'
      - 'rust/**'
      - 'adapters/**'
      - 'scripts/**'
      - 'schemas/**'
      - 'tests/**'
      - 'bench/benchmark/tasks/**'
      - '.github/workflows/benchmark-v0-gates.yml'

jobs:
  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Validate schemas
        run: python -m bench.cli validate-schemas

  strict-task-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Validate suite strict
        run: python -m bench.cli validate-suite v0 --repeat 2 --check-determinism --strict

  runner-unit-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Runner unit contracts
        run: cargo test --manifest-path rust/Cargo.toml -p lab-runner

  adapter-schema-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Adapter schema contracts
        run: |
          python -m pytest \
            scripts/harbor/tests/test_harbor_benchmark_adapter.py \
            scripts/harbor/tests/test_check_harbor_adapter_compat.py \
            bench/integration/agentlab/test_bench_benchmark_adapter.py

  runner-docker-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Runner Docker integration (artifact unpack + continue/recover)
        run: |
          cargo test --manifest-path rust/Cargo.toml -p lab-runner inv04_artifact_unpack_succeeds_with_container_fs_constraints
          cargo test --manifest-path rust/Cargo.toml -p lab-runner inv06_recover_then_continue_succeeds_with_minimal_env
          cargo test --manifest-path rust/Cargo.toml -p lab-runner inv06_continue_handles_relative_and_absolute_dataset_paths

  cli-black-box-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      LAB_CLI_BIN: ${{ github.workspace }}/rust/target/release/lab-cli
      AGENTLAB_MIN_FREE_BYTES: "1073741824"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Build lab-cli release
        run: cargo build --manifest-path rust/Cargo.toml -p lab-cli --release
      - name: Refresh lab-cli mtime for stale-binary guard
        run: touch rust/target/release/lab-cli
      - name: Run CLI E2E suite
        run: python -m pytest tests/e2e_cli/test_cli_e2e.py -q
